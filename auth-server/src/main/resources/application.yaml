server:
  port: 9000
  forward-headers-strategy: framework
  servlet:
    context-path: /auth
    session:
      cookie:
        path: /auth
        name: AUTH_SESSION_ID
        http-only: true
        same-site: lax

spring:
  application:
    name: auth-server
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/identity-service}
    username: ${AUTH_DB_USER:postgres }
    password: ${AUTH_DB_PASSWORD:C5m.SuperGalaxy}

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    defer-datasource-initialization: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
              - openid
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/auth/login/oauth2/code/google
            # redirect-uri: http://localhost:9000/login/oauth2/code/google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub


app:
  jwt:
    private-key: ${AUTH_SERVER_PRIVATE_KEY}
    public-key: ${AUTH_SERVER_PUBLIC_KEY}
    key-id: ${AUTH_SERVER_KEY_ID}
    issuer: ${ISSUER_URI}

  client-registration:
    clients:
      GATEWAY:
        client-id: "gateway-client"
        secret: ${GATEWAY_SECRET}
        redirect-uri: ${GATEWAY_URI:http://localhost:8080}/login/oauth2/code/gateway-client
        access-token-ttl: "PT15M"
        refresh-token-ttl: "PT720H"
      SERVICE:
        client-id: "service-client"
        secret: ${SERVICE_SECRET}
        access-token-ttl: "PT15M"
        refresh-token-ttl: "PT30D"

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.security.oauth2.server.authorization: TRACE
    org.springframework.session: TRACE

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
