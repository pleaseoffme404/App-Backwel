<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder | Backwel</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuración inyectada de la paleta oficial de Backwel -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#10141A',
                            secondary: '#1C212C',
                        },
                        brand: {
                            primary: '#0A3C51',
                            secondary: '#007299',
                        },
                        accent: '#7B4FBF',
                        text: {
                            primary: '#F4F7FE',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background-primary flex items-center justify-center min-h-screen font-sans antialiased text-text-primary selection:bg-accent selection:text-white">

    <!-- Card de Login -->
    <div class="bg-background-secondary p-8 rounded-xl shadow-2xl w-full max-w-md border border-brand-primary/30">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-text-primary tracking-tight">BACKWEL</h2>
            <p class="text-sm text-brand-secondary mt-2">Gestión Comercial Inteligente</p>
        </div>

        <!-- Alertas de Spring Security -->
        <div th:if="${param.error}" class="bg-red-900/40 border border-red-500/50 text-red-200 p-3 rounded-lg text-sm text-center mb-6">
            Credenciales inválidas. Inténtalo de nuevo.
        </div>
        <div th:if="${param.logout}" class="bg-green-900/40 border border-green-500/50 text-green-200 p-3 rounded-lg text-sm text-center mb-6">
            Sesión terminada correctamente.
        </div>

        <!-- Formulario POST -->
        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-text-primary/80 mb-1.5">Usuario o Email</label>
                <input type="text" id="username" name="username" required autofocus
                       class="w-full px-4 py-2.5 bg-background-primary border border-brand-primary/50 rounded-lg text-text-primary focus:ring-2 focus:ring-accent focus:border-accent transition-all outline-none placeholder-text-primary/30">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-text-primary/80 mb-1.5">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2.5 bg-background-primary border border-brand-primary/50 rounded-lg text-text-primary focus:ring-2 focus:ring-accent focus:border-accent transition-all outline-none placeholder-text-primary/30">
            </div>

            <button type="submit" 
                    class="w-full mt-2 bg-brand-primary hover:bg-brand-secondary text-text-primary font-semibold py-3 rounded-lg transition-all shadow-md hover:shadow-lg focus:ring-4 focus:ring-brand-primary/50 active:scale-[0.98]">
                Entrar
            </button>
        </form>

        <!-- Divisor -->
        <div class="relative flex items-center justify-center my-7">
            <div class="absolute border-t border-brand-primary/30 w-full"></div>
            <span class="bg-background-secondary px-4 text-xs font-semibold text-text-primary/40 uppercase relative tracking-wider">O</span>
        </div>

        <!-- Botón Google -->
        <a th:href="@{/oauth2/authorization/google}" 
           class="w-full flex items-center justify-center gap-3 bg-background-primary border border-brand-primary/50 text-text-primary hover:bg-brand-primary/20 font-medium py-3 rounded-lg transition-all shadow-sm active:scale-[0.98]">
            <img src='https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_"G"_logo.svg' alt="Google" class="w-5 h-5">
            Continuar con Google
        </a>
    </div>

</body>
</html>
