<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Backwell</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #1c1e21;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #4b4f56;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 2px #e7f3ff;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #166fe5;
        }

        /* Divisor "O" */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #8d949e;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dddfe2;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Botón Google */
        .btn-google {
            width: 100%;
            padding: 10px;
            background-color: white;
            color: #5f6368;
            border: 1px solid #dadce0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-google:hover {
            background-color: #f8f9fa;
            border-color: #d2d4d7;
        }
        .btn-google img {
            width: 18px;
            margin-right: 10px;
        }

        .error { color: #fa3e3e; text-align: center; font-size: 14px; margin-bottom: 15px; }
        .info { color: #28a745; text-align: center; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>BACKWELL AUTH SERVER</h2>

    <div th:if="${param.error}" class="error">
        Credenciales inválidas. Inténtalo de nuevo.
    </div>

    <div th:if="${param.logout}" class="info">
        Sesión terminada correctamente.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Usuario o Email</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
    </form>

    <div class="divider">o</div>

    <a th:href="@{/oauth2/authorization/google}" class="btn-google">
        <img src= 'https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_"G"_logo.svg' alt="Google Logo">
        Continuar con Google
    </a>
</div>
</body>
</html>
