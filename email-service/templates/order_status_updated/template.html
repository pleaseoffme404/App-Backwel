<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eaeaea; border-radius: 8px;">
    <h2 style="color: #2c3e50;">Hola, {{customer_name}}</h2>
    <p>El estado de tu pedido <strong>#{{order_id}}</strong> ha sido actualizado.</p>

    <div style="padding: 15px; border-left: 4px solid #007bff; background-color: #f8f9fa; margin: 20px 0;">
        <p style="font-size: 18px; margin: 0;">Nuevo estado: <strong style="color: #007bff; text-transform: uppercase;">{{new_status}}</strong></p>
    </div>

    <p>Si tienes alguna duda, puedes ponerte en contacto con nuestro equipo.</p>
</div>
</body>
</html>
