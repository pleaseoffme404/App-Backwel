<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; color: #333;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eaeaea; border-radius: 8px;">
    <h2 style="color: #2c3e50;">¡Gracias por tu compra, {{customer_name}}!</h2>
    <p>Tu pedido ha sido recibido exitosamente y está siendo procesado.</p>

    <div style="background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin: 20px 0;">
        <p><strong>Número de Pedido:</strong> {{order_id}}</p>
        <p><strong>Total pagado:</strong> ${{total_amount}}</p>
    </div>

    <p>Te notificaremos en cuanto tu pedido cambie de estado.</p>
    <p style="font-size: 12px; color: #888; margin-top: 30px;">Equipo de Backwel Point of Sale</p>
</div>
</body>
</html>
