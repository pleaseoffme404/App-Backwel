services:
  order-simulator:
    build:
      context: ./order-simulator
      dockerfile: Dockerfile
    container_name: order-simulator
    restart: always
    environment:
      - SIMULATOR_PORT=3005
      - EMAIL_SERVICE_URL=http://email-service:3001/emails
      - CRON_SCHEDULE=*/1 * * * *
      - SERVICE_EMAIL_SECRET=${SERVICE_EMAIL_SECRET}
    ports:
      - "3005:3005"
    depends_on:
      email-service:
        condition: service_started
  auth-db:
    image: postgres:18
    container_name: auth-database
    restart: always
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis-session:
    image: redis:7.2-alpine
    container_name: bff-redis
    ports:
      - "${AUTH_REDIS_PORT}:6379"
    command: redis-server --requirepass ${AUTH_REDIS_PASSWORD} --appendonly yes
    volumes:
      - bff_redis_data:/data

  api-db:
    image: postgres:18
    container_name: api-db
    restart: always
    environment:
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD}
      POSTGRES_DB: ${API_DB_NAME}
    ports:
      - "${API_DB_PORT}:5432"
    volumes:
      - api_postgres_data:/var/lib/postgresql
      - ./api-service/src/main/resources/db/migration:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${API_DB_USER} -d ${API_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend-db:
    image: postgres:18
    container_name: frontend-database
    restart: always
    environment:
      POSTGRES_USER: ${FRONTEND_DB_USER}
      POSTGRES_PASSWORD: ${FRONTEND_DB_PASSWORD}
      POSTGRES_DB: ${FRONTEND_DB_NAME}
    ports:
      - "${FRONTEND_DB_PORT}:5432"
    volumes:
      - frontend_postgres_data:/var/lib/postgresql
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${FRONTEND_DB_USER} -d ${FRONTEND_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    ports:
      - "${MEILI_PORT}:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    restart: always

  api-cache:
    image: redis:7.2-alpine
    container_name: api-cache
    command: redis-server --requirepass ${API_REDIS_PASSWORD} --databases 16
    ports:
      - "${API_REDIS_PORT}:6379"
    volumes:
      - api_redis_data:/data

  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-server:
    build: ./auth-server
    ports:
      - "9000:9000"
    depends_on:
      auth-db:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/auth/actuator/health" ]
      interval: 10s
      retries: 5
    environment:
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      SERVICE_SECRET: ${SERVICE_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      EUREKA_SERVER: http://service-registry:8761/eureka
      AUTH_SERVER_PRIVATE_KEY: ${AUTH_SERVER_PRIVATE_KEY}
      AUTH_SERVER_PUBLIC_KEY: ${AUTH_SERVER_PUBLIC_KEY}
      AUTH_SERVER_KEY_ID: ${AUTH_SERVER_KEY_ID}
      ISSUER_URI: ${ISSUER_URI}

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      auth-server:
        condition: service_healthy
      redis-session:
        condition: service_started
    environment:
      AUTH_REDIS_HOST: redis-session
      AUTH_REDIS_PORT: 6379
      AUTH_REDIS_PASSWORD: ${AUTH_REDIS_PASSWORD}
      CLIENT_ID: gateway-client
      CLIENT_SECRET: ${GATEWAY_SECRET}
      ISSUER_URI: ${ISSUER_URI}
      AUTH_SERVER_EXTERNAL: http://localhost:9000/auth
      AUTH_SERVER_INTERNAL: http://auth-server:9000/auth
      EUREKA_URL: http://service-registry:8761/eureka/

  api-service:
    build: ./api-service
    ports:
      - "8000:8000"
    depends_on:
      api-db:
        condition: service_healthy
    environment:
      API_REDIS_HOST: api-cache
      API_REDIS_PORT: 6379
      API_REDIS_PASSWORD: ${API_REDIS_PASSWORD}
      API_DB_URL: jdbc:postgresql://api-db:5432/${API_DB_NAME}
      API_DB_USER: ${API_DB_USER}
      API_DB_PASSWORD: ${API_DB_PASSWORD}
      AUTH_SERVER_INTERNAL: http://auth-server:9000/auth
      EUREKA_SERVER: http://service-registry:8761/eureka/
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY}

  email-service:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    container_name: email-service
    restart: always
    environment:
      SERVICE_EMAIL_SECRET: ${SERVICE_EMAIL_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      QUEUE_HOST: ${QUEUE_HOST}
      QUEUE_PORT: ${QUEUE_PORT}
      QUEUE_NAME: ${QUEUE_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  data-ai-analytics:
    build:
      context: ./DataAiAnalitycs
      dockerfile: Dockerfile
    container_name: data-ai-analytics
    restart: always
    ports:
      - "7777:7777"
    depends_on:
      app-backwel:
        condition: service_healthy
      api-gateway:
        condition: service_started
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
      - FRONTEND_URL=http://app-backwel:3000
      - host=host.docker.internal
      - database=dataAi
      - user=postgres
      - password=pkl78loq
      - port=5432
    networks:
      default: null
  app-backwel:
    build:
      context: ./app-backwel
      dockerfile: Dockerfile
    container_name: app-backwel
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      frontend-db:
        condition: service_healthy
      api-gateway:
        condition: service_started
      redis-session:
        condition: service_started
      email-service:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${FRONTEND_DB_USER}:${FRONTEND_DB_PASSWORD}@frontend-db:5432/${FRONTEND_DB_NAME}
      GATEWAY_URL: http://api-gateway:8080
      REDIS_HOST: redis-session
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${AUTH_REDIS_PASSWORD}
      NODE_ENV: production
      API_GATEWAY_URL: http://api-gateway:8080
    volumes:
      - ./app-backwel/public/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
volumes:
  meili_data:
  auth_postgres_data:
  api_postgres_data:
  frontend_postgres_data:
  bff_redis_data:
  api_redis_data:

  